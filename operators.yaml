operators:
  cernet:
    country: 'CN'
    pattern: '(cngi|cernet)'
  china:
    country: 'CN'
    pattern: ''
    origin_only: true
    # Experimental: exclude CN-registered ASNs whose observed direct upstreams
    # in the local RIB snapshot are all non-CN.
    exclude_foreign_upstream_only: true
    exclude_asn:
      - '7721'
      - '24429'
      - '134413'
      - '139317'
      - '140731'
      - '142111'
      - '142586'
      - '150141'
      - '150184'
      - '150373'
      - '151187'
      - '151194'
      - '151202'
      - '151494'
      - '151673'
      - '151785'
      - '153725'
      - '199310'
      - '199932'
      - '205610'
      - '209300'
      - '209306'
  chinanet:
    country: 'CN'
    pattern: '(china ?telecom|chinanet|AS4847 )'
  cmcc:
    country: 'CN'
    pattern: '(china mobile|cmnet|tietong|CHINA RAILWAY)'
  cstnet:
    country: 'CN'
    pattern: 'cstnet'
  drpeng:
    country: 'CN'
    pattern: '(dxtnet|dr.?peng|gxblnet|xirang)'
  googlecn:
    country: 'CN'
    pattern: 'AS24424'
  unicom:
    country: 'CN'
    pattern: '(unicom|cnc)'
